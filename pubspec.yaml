name: flodo_task_app
description: Flodo AI Take-Home - Task Management App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Local Database
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1 # includes native libs for mobile

  shared_preferences: ^2.2.3

  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  intl: ^0.19.0
  gap: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  isar_generator: ^3.1.0+1
  riverpod_generator: ^2.4.0
  custom_lint: ^0.6.4
#  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true
