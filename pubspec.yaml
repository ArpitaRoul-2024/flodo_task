name: flodo_task_app
description: Flodo AI Take-Home - Task Management App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter


  flutter_riverpod: ^2.5.1


  hive_flutter: ^1.1.0
  uuid: ^4.4.0


  shared_preferences: ^2.2.3


  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  intl: ^0.19.0
  gap: ^3.0.1
  lottie: ^3.3.2
  flutter_native_splash: ^2.4.7
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  hive_generator: ^2.0.1

flutter_native_splash:
  color: "#1A1D2E"
  image: assets/logo.png
  android: true
  ios: true
  android_gravity: center
  ios_content_mode: center
  fullscreen: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  adaptive_icon_background: "#1A1D2E"
  adaptive_icon_foreground: "assets/logo.png"
flutter:
  uses-material-design: true
  assets:
    - assets/